name: SUSHI LOOP Evolution

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Configure git
        run: |
          git config user.name "SUSHI LOOP Bot"
          git config user.email "sushi@phantomcap.ai"
      
      - name: Run cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_cycle.py || echo "Cycle completed"
      
      - name: Commit changes
        run: |
          git add skills/ tests/ brain/ docs/ || true
          if ! git diff --staged --quiet; then
            git commit -m "🍣 SUSHI LOOP Auto Evolution"
            git push origin main
          fi
