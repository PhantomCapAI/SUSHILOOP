name: SUSHI LOOP Evolution

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sushi-loop-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "SUSHI LOOP Bot"
          git config user.email "sushi@phantomcap.ai"

      - name: Run cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_cycle.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          RESULT=$(cat .cycle_result 2>/dev/null || echo "UNKNOWN")
          echo "Cycle result: $RESULT"

          # brain/ and docs/ always persist (memory + state), so the loop learns
          # from rejections too.
          git add brain/ docs/ 2>/dev/null || true

          if [ "$RESULT" = "SUCCESS" ]; then
            # Only a passing skill ships its skill + test files.
            git add skills/ tests/ 2>/dev/null || true
          else
            # Gate rejected the skill: discard any generated skill/test files so
            # a broken skill never reaches main. (brain/ already staged above.)
            echo "Result is $RESULT — discarding unstaged skill/test changes"
            git checkout -- skills/ tests/ 2>/dev/null || true
            git clean -fq skills/ tests/ 2>/dev/null || true
          fi

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🍣 SUSHI LOOP Auto Evolution ($RESULT)"
          # Pull with strategy: ours-wins for brain files (they're runner-generated)
          git fetch origin main
          git merge -X ours origin/main --no-edit || {
            echo "Merge failed, resetting brain files and retrying"
            git checkout --ours brain/
            git add brain/
            git commit -m "Resolve brain/ conflicts (keep runner state)" || true
          }
          git push origin main
