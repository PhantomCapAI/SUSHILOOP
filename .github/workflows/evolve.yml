name: SUSHI LOOP Evolution

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "SUSHI LOOP Bot"
          git config user.email "sushi@phantomcap.ai"

      - name: Run cycle
        id: run_cycle
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_cycle.py
        continue-on-error: true

      - name: Commit and push changes
        run: |
          git add skills/ tests/ brain/ docs/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🍣 SUSHI LOOP Auto Evolution"
            git pull --rebase origin main || true
            git push origin main
          fi

      - name: Auto-tweet new skill
        if: steps.run_cycle.outputs.new_skill == 'true' && secrets.X_API_KEY != ''
        uses: snow-actions/post-tweet@v1
        with:
          consumer-key: ${{ secrets.X_API_KEY }}
          consumer-secret: ${{ secrets.X_API_SECRET }}
          access-token: ${{ secrets.X_ACCESS_TOKEN }}
          access-token-secret: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          status: |
            🍣 Just shipped a new guardrail: ${{ steps.run_cycle.outputs.skill_title }}
            ${{ steps.run_cycle.outputs.skill_description }}
            Protecting human cognition, one autonomous cycle at a time.
            https://github.com/PhantomCapAI/SUSHILOOP
